<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — HerdSync</title>
    <link rel="icon" href="https://herd-sync.com/logos/favicon.ico?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/signin.css" />
  </head>
  <body>
    <div class="page">
      <div class="card">
        <div class="logo-wrap">
          <img src="/logos/dark_trans_v3.png" alt="HerdSync" />
        </div>
        <div class="box">
          <h1>Sign in</h1>
          <p class="sub">Enter your credentials to continue</p>
          <p class="error-msg" id="errorMsg"></p>
          <div class="field">
            <label>Username</label>
            <input
              type="text"
              id="username"
              placeholder="Username"
              autocomplete="username"
            />
          </div>
          <div class="field">
            <label>Password</label>
            <input
              type="password"
              id="password"
              placeholder="Password"
              autocomplete="current-password"
            />
          </div>
          <button class="btn-signin" id="signinBtn">Sign In</button>
        </div>
        <div class="footer">
          <a href="/">&larr; Back to herd-sync.com</a>
        </div>
      </div>
    </div>

    <script>
      const KEYS = {
        accessToken: "herdsync_access_token",
        refreshToken: "herdsync_refresh_token",
        expiresAt: "herdsync_token_expires_at",
        user: "herdsync_user",
      };

      // If already authenticated, skip to dashboard
      (function checkExisting() {
        const token = sessionStorage.getItem(KEYS.accessToken);
        const expiresAt = parseInt(
          sessionStorage.getItem(KEYS.expiresAt) || "0",
        );
        if (token && Date.now() < expiresAt) {
          window.location.href = "/dashboard";
          return;
        }
        // Try refresh token
        const refresh = localStorage.getItem(KEYS.refreshToken);
        if (refresh) {
          fetch("/auth/refresh", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ refresh_token: refresh }),
          })
            .then((r) => {
              if (r.ok) return r.json();
              throw new Error("expired");
            })
            .then((data) => {
              sessionStorage.setItem(KEYS.accessToken, data.access_token);
              sessionStorage.setItem(
                KEYS.expiresAt,
                (Date.now() + data.expires_in * 1000).toString(),
              );
              if (data.refresh_token)
                localStorage.setItem(KEYS.refreshToken, data.refresh_token);
              if (data.user)
                localStorage.setItem(KEYS.user, JSON.stringify(data.user));
              window.location.href = "/dashboard";
            })
            .catch(() => {
              localStorage.removeItem(KEYS.refreshToken);
            });
        }
      })();

      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const btn = document.getElementById("signinBtn");
      const errorEl = document.getElementById("errorMsg");

      async function handleLogin() {
        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        if (!username || !password) {
          errorEl.textContent = "Enter username and password";
          return;
        }

        btn.disabled = true;
        btn.textContent = "Signing in...";
        errorEl.textContent = "";

        try {
          const resp = await fetch("/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });

          if (!resp.ok) {
            const err = await resp
              .json()
              .catch(() => ({ detail: "Login failed" }));
            throw new Error(err.detail || "Login failed");
          }

          const data = await resp.json();

          // Store tokens
          sessionStorage.setItem(KEYS.accessToken, data.access_token);
          sessionStorage.setItem(
            KEYS.expiresAt,
            (Date.now() + data.expires_in * 1000).toString(),
          );
          if (data.refresh_token)
            localStorage.setItem(KEYS.refreshToken, data.refresh_token);
          localStorage.setItem(KEYS.user, JSON.stringify(data.user));

          // Navigate to dashboard — full page load, clean state
          window.location.href = "/dashboard";
        } catch (err) {
          errorEl.textContent = err.message;
          btn.disabled = false;
          btn.textContent = "Sign In";
          passwordInput.value = "";
          passwordInput.focus();
        }
      }

      btn.addEventListener("click", handleLogin);
      passwordInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleLogin();
      });
      usernameInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") passwordInput.focus();
      });
      setTimeout(() => usernameInput.focus(), 50);
    </script>
  </body>
</html>
