<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — HerdSync</title>
    <link rel="icon" href="https://herd-sync.com/logos/favicon.ico?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/signin.css" />
  </head>
  <body>
    <div class="page">
      <div class="card">
        <div class="logo-wrap">
          <img src="/logos/dark_trans_v3.png" alt="HerdSync" />
        </div>
        <div class="box">
          <h1>Sign in</h1>
          <p class="sub">Enter your credentials to continue</p>
          <p class="error-msg" id="errorMsg"></p>
          <div class="field">
            <label>Username</label>
            <input
              type="text"
              id="username"
              placeholder="Username"
              autocomplete="username"
            />
          </div>
          <div class="field">
            <label>Password</label>
            <input
              type="password"
              id="password"
              placeholder="Password"
              autocomplete="current-password"
            />
          </div>
          <button class="btn-signin" id="signinBtn">Sign In</button>
        </div>
        <div class="footer">
          <a href="/">&larr; Back to herd-sync.com</a>
        </div>
      </div>
    </div>

    <script src="js/signin/app.js"></script>
  </body>
</html>
