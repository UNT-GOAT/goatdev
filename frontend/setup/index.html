<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Capture | HerdSync</title>
    <script src="/config.js"></script>
    <script src="/js/auth.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #1a1a2e;
        color: white;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 20px;
        background: #0d0d1a;
        z-index: 100;
        border-bottom: 1px solid #222;
      }
      .nav-left {
        display: flex;
        align-items: center;
        gap: 20px;
      }
      .nav-brand {
        font-size: 15px;
        font-weight: 700;
        color: #4caf50;
        letter-spacing: 0.5px;
      }
      .nav-links {
        display: flex;
        gap: 4px;
      }
      .nav-links a {
        color: #666;
        text-decoration: none;
        font-size: 13px;
        padding: 6px 12px;
        border-radius: 6px;
        transition: all 0.2s;
      }
      .nav-links a:hover {
        color: #ccc;
        background: #1a1a2e;
      }
      .nav-links a.active {
        color: #4caf50;
        background: #1a1a2e;
      }
      .nav-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .nav-user {
        font-size: 11px;
        color: #555;
      }
      .logout-btn {
        background: none;
        border: 1px solid #333;
        color: #666;
        padding: 6px 14px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 13px;
      }
      .logout-btn:hover {
        border-color: #666;
        color: #888;
      }
      #app {
        display: none;
        padding: 20px;
        padding-top: 70px;
        width: 100%;
        max-width: 800px;
      }
      .app-layout {
        display: flex;
        gap: 30px;
        align-items: flex-start;
      }
      .control-panel {
        flex: 0 0 auto;
        text-align: center;
      }
      .right-panel {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .form-panel {
        background: #0d0d1a;
        border-radius: 10px;
        padding: 15px;
      }
      .form-title {
        font-size: 12px;
        color: #666;
        margin-bottom: 15px;
        text-transform: uppercase;
      }
      .form-row {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
      }
      .form-group {
        flex: 1;
        min-width: 120px;
      }
      .form-group label {
        display: block;
        font-size: 11px;
        color: #888;
        margin-bottom: 5px;
        text-transform: uppercase;
      }
      .form-group input,
      .form-group select {
        width: 100%;
        padding: 10px;
        font-size: 14px;
        border: 1px solid #333;
        border-radius: 6px;
        background: #1a1a2e;
        color: white;
      }
      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: #4caf50;
      }
      .form-group select {
        cursor: pointer;
      }
      .counter {
        font-size: 100px;
        font-weight: bold;
        color: #4caf50;
        margin: 10px 0;
      }
      .counter.loading {
        color: #666;
        font-size: 50px;
      }
      .label {
        font-size: 16px;
        color: #888;
        margin-bottom: 20px;
      }
      .buttons {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      .record-btn {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        border: none;
        background: #e53935;
        color: white;
        font-size: 24px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 8px 30px rgba(229, 57, 53, 0.4);
        transition: all 0.2s;
      }
      .record-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 12px 40px rgba(229, 57, 53, 0.5);
      }
      .record-btn:disabled {
        background: #666;
        cursor: not-allowed;
        box-shadow: none;
        transform: none;
      }
      .record-btn.recording {
        background: #ff9800;
        animation: pulse 1s infinite;
      }
      .mock-btn {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 3px dashed #4caf50;
        background: transparent;
        color: #4caf50;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s;
      }
      .mock-btn:hover {
        background: rgba(76, 175, 80, 0.1);
        transform: scale(1.05);
      }
      .mock-btn:disabled {
        border-color: #666;
        color: #666;
        cursor: not-allowed;
        transform: none;
      }
      .mock-btn.recording {
        border-color: #ff9800;
        color: #ff9800;
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }
      .warning {
        background: #ff9800;
        color: #000;
        padding: 10px 15px;
        border-radius: 8px;
        font-size: 14px;
        margin-bottom: 20px;
      }
      .status {
        margin-top: 30px;
        font-size: 16px;
        color: #888;
        min-height: 24px;
      }
      .status.error {
        color: #e53935;
      }
      .status.success {
        color: #4caf50;
      }
      .log-container {
        background: #0d0d1a;
        border-radius: 10px;
        padding: 15px;
        height: 350px;
        display: flex;
        flex-direction: column;
      }
      .log-title {
        font-size: 12px;
        color: #666;
        margin-bottom: 10px;
        text-transform: uppercase;
        flex-shrink: 0;
      }
      .log {
        font-family: monospace;
        font-size: 12px;
        line-height: 1.6;
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }
      .log-entry {
        margin-bottom: 4px;
        flex-shrink: 0;
      }
      .log-entry.info {
        color: #888;
      }
      .log-entry.success {
        color: #4caf50;
      }
      .log-entry.error {
        color: #e53935;
      }
      .log-entry.warn {
        color: #ff9800;
      }
      .log-time {
        color: #555;
        margin-right: 8px;
      }
      @media (max-width: 600px) {
        .app-layout {
          flex-direction: column;
        }
        .control-panel {
          width: 100%;
        }
        .log-container {
          height: 200px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <nav class="nav">
        <div class="nav-left">
          <span class="nav-brand">HerdSync</span>
          <div class="nav-links">
            <a href="index.html" class="active">Capture</a>
            <a href="heater.html">Heaters</a>
            <a href="view-focus.html">View Focus</a>
          </div>
        </div>
        <div class="nav-right">
          <span class="nav-user" id="navUser"></span>
          <button class="logout-btn" onclick="HerdAuth.logout()">Logout</button>
        </div>
      </nav>
      <div class="app-layout">
        <div class="control-panel">
          <div class="label">GOAT NUMBER</div>
          <div class="counter" id="counter">...</div>
          <div class="buttons">
            <div class="warning">Warning: Only use CAPTURE for real data</div>
            <button
              class="record-btn"
              id="recordBtn"
              onclick="startCapture(false)"
            >
              CAPTURE
            </button>
            <button class="mock-btn" id="mockBtn" onclick="startCapture(true)">
              TEST<br />(no save)
            </button>
          </div>
          <div class="status" id="status"></div>
        </div>
        <div class="right-panel">
          <div class="form-panel">
            <div class="form-title">Goat Data</div>
            <div class="form-row">
              <div class="form-group">
                <label>Description</label>
                <select id="description">
                  <option value="">-- Select --</option>
                  <option value="dairy">Dairy</option>
                  <option value="meat">Meat</option>
                  <option value="cross">Cross</option>
                </select>
              </div>
              <div class="form-group">
                <label>Live Weight</label>
                <input type="text" id="liveWeight" placeholder="e.g. 85 lbs" />
              </div>
              <div class="form-group">
                <label>Grade</label>
                <select id="grade">
                  <option value="">-- Select --</option>
                  <option value="reserve">Reserve</option>
                  <option value="cab prime">CAB Prime</option>
                  <option value="prime">Prime</option>
                  <option value="cab choice">CAB Choice</option>
                  <option value="choice">Choice</option>
                  <option value="select">Select</option>
                  <option value="no roll">No Roll</option>
                </select>
              </div>
            </div>
          </div>
          <div class="log-panel">
            <div class="log-container">
              <div class="log-title">Activity Log</div>
              <div class="log" id="log"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      let goatId = 1;
      let isCapturing = false;

      function getFormData() {
        return {
          description: document.getElementById("description").value || null,
          live_weight: document.getElementById("liveWeight").value || null,
          grade: document.getElementById("grade").value || null,
        };
      }
      function clearForm() {
        document.getElementById("description").value = "";
        document.getElementById("liveWeight").value = "";
        document.getElementById("grade").value = "";
      }
      function log(message, type = "info") {
        const logEl = document.getElementById("log");
        const time = new Date().toLocaleTimeString();
        const entry = document.createElement("div");
        entry.className = "log-entry " + type;
        entry.innerHTML =
          '<span class="log-time">' + time + "</span>" + message;
        logEl.appendChild(entry);
        logEl.scrollTop = logEl.scrollHeight;
      }
      function clearLog() {
        document.getElementById("log").innerHTML = "";
      }

      async function showApp(user) {
        document.getElementById("app").style.display = "block";
        document.getElementById("navUser").textContent =
          user.username + " (" + user.role + ")";
        log("Initializing...", "info");
        await fetchCurrentCount();
      }
      async function fetchCurrentCount() {
        const counter = document.getElementById("counter");
        counter.textContent = "...";
        counter.classList.add("loading");
        log("Fetching goat count from S3...", "info");
        try {
          const response = await fetch(
            `https://${CONFIG.S3_BUCKET}.s3.${CONFIG.S3_REGION}.amazonaws.com/?list-type=2&delimiter=/`,
          );
          if (!response.ok) throw new Error("S3 returned " + response.status);
          const text = await response.text();
          const parser = new DOMParser();
          const xml = parser.parseFromString(text, "text/xml");
          const prefixes = xml.querySelectorAll("CommonPrefixes > Prefix");
          let maxId = 0;
          prefixes.forEach((prefix) => {
            const folder = prefix.textContent.replace("/", "");
            const num = parseInt(folder);
            if (!isNaN(num) && num > maxId) maxId = num;
          });
          goatId = maxId + 1;
          log(
            "Found " + maxId + " existing captures. Next goat: #" + goatId,
            "success",
          );
        } catch (err) {
          console.error("Failed to fetch count from S3:", err);
          log("Could not sync with cloud. Using local counter.", "warn");
          goatId = parseInt(localStorage.getItem("goatId") || "1");
          log("Starting at goat #" + goatId, "info");
        }
        updateCounter();
        counter.classList.remove("loading");
      }
      function updateCounter() {
        document.getElementById("counter").textContent = goatId;
        localStorage.setItem("goatId", goatId.toString());
      }
      async function startCapture(isMock) {
        if (isCapturing) return;
        const btn = isMock
          ? document.getElementById("mockBtn")
          : document.getElementById("recordBtn");
        const otherBtn = isMock
          ? document.getElementById("recordBtn")
          : document.getElementById("mockBtn");
        const status = document.getElementById("status");
        isCapturing = true;
        btn.disabled = true;
        otherBtn.disabled = true;
        btn.classList.add("recording");
        clearLog();
        if (isMock) {
          btn.innerHTML = "TESTING...";
          status.textContent = "Test capture (not saving)...";
          log("Starting TEST capture (will not save)", "warn");
        } else {
          btn.textContent = "CAPTURING...";
          status.textContent = "Capturing goat #" + goatId + "...";
          log("Starting capture for goat #" + goatId, "info");
        }
        status.className = "status";
        try {
          log("Connecting to Pi server...", "info");
          const formData = isMock ? {} : getFormData();
          const captureId = isMock ? "test_" + Date.now() : goatId;
          let response;
          try {
            response = await HerdAuth.fetch(
              CONFIG.API_BASE + "/api/capture/record",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  goat_id: captureId,
                  goat_data: formData,
                  is_test: isMock,
                  require_all_cameras: !isMock,
                }),
              },
            );
          } catch (networkErr) {
            throw new Error(
              "Cannot reach Pi server. Check that it is powered on and connected.",
            );
          }
          if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            const errorMessages = {
              NO_CAMERAS:
                "No cameras connected. Please plug in the cameras and try again.",
              CAPTURE_IN_PROGRESS:
                "Capture already in progress on another connection. Please wait.",
              CAMERA_PERMISSION_DENIED:
                "Camera permission denied. Check creds and connections.",
              LOW_DISK_SPACE: "Pi is low on disk space.",
              MISSING_CAMERAS:
                "Not all cameras are connected. Plug in all cameras to capture data.",
            };
            throw new Error(
              errorMessages[errorData.error_code] ||
                errorData.message ||
                "Failed to start capture",
            );
          }
          const startData = await response.json();
          log("Capture started on Pi", "success");
          if (startData.cameras_available?.length > 0)
            log(
              "Cameras ready: " + startData.cameras_available.join(", "),
              "success",
            );
          if (startData.warning) log(startData.warning, "warn");
          log("Capturing 20 images (~20 seconds)...", "info");
          await pollStatus();
          if (isMock) {
            log("Test capture complete.", "success");
            status.textContent = "Test complete";
            status.className = "status success";
          } else {
            log("Images saved to S3.", "success");
            log(
              "Goat #" + goatId + " complete. Next: #" + (goatId + 1),
              "success",
            );
            status.textContent = "Goat #" + goatId + " captured.";
            status.className = "status success";
            goatId++;
            updateCounter();
            clearForm();
          }
        } catch (err) {
          log("ERROR: " + err.message, "error");
          status.textContent = isMock ? "Test failed" : "Failed";
          status.className = "status error";
        } finally {
          isCapturing = false;
          btn.disabled = false;
          otherBtn.disabled = false;
          btn.classList.remove("recording");
          if (isMock) btn.innerHTML = "TEST<br>(no save)";
          else btn.textContent = "CAPTURE";
        }
      }
      async function pollStatus() {
        const maxAttempts = 240;
        let lastProgress = null;
        for (let i = 0; i < maxAttempts; i++) {
          await sleep(500);
          let response;
          try {
            response = await HerdAuth.fetch(
              CONFIG.API_BASE + "/api/capture/status",
            );
          } catch (networkErr) {
            log("Lost connection to Pi...", "warn");
            continue;
          }
          const data = await response.json();
          if (data.progress && data.progress !== lastProgress) {
            lastProgress = data.progress;
            const msgs = {
              starting: "Initializing cameras...",
              capturing: "Capturing images...",
              checking_s3: "Checking S3 access...",
              uploading: "Uploading images to cloud...",
            };
            log(msgs[data.progress] || data.progress, "info");
          }
          if (!data.active) {
            if (data.last_error) throw new Error(data.last_error);
            if (data.last_result) {
              if (data.last_result.camera_status) {
                for (const [cam, s] of Object.entries(
                  data.last_result.camera_status,
                )) {
                  if (s.startsWith("captured"))
                    log(`✓ ${cam}: ${s}`, "success");
                  else if (s === "failed")
                    log(`✗ ${cam}: capture failed`, "error");
                  else if (s === "missing")
                    log(`— ${cam}: not connected`, "warn");
                }
              }
              if (data.last_result.total_images)
                log(
                  `Total images captured: ${data.last_result.total_images}`,
                  "info",
                );
              if (data.last_result.s3_check) {
                if (data.last_result.s3_check.ok)
                  log("S3 upload check OK", "success");
                else
                  log(
                    "S3 upload check FAILED: " +
                      (data.last_result.s3_check.error || "unknown"),
                    "error",
                  );
              }
              if (data.last_result.errors?.length > 0) {
                data.last_result.errors.forEach((e) => {
                  if (typeof e === "object")
                    log(`${e.camera}: ${e.error}`, "warn");
                  else log("Warning: " + e, "warn");
                });
              }
              if (!data.last_result.success)
                throw new Error("Capture failed. Check camera connections.");
            }
            return;
          }
        }
        throw new Error("Capture timed out. The Pi may be unresponsive.");
      }
      function sleep(ms) {
        return new Promise((r) => setTimeout(r, ms));
      }

      // Auth gate — show app when authenticated
      HerdAuth.requireAuth().then((user) => showApp(user)); //
    </script>
  </body>
</html>
