<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0,user-scalable=no"
    />
    <title>Setup | HerdSync</title>
    <link rel="icon" href="https://herd-sync.com/logos/favicon.ico?v=2" />
    <script src="/js/config.js"></script>
    <script src="/js/auth.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root,
      :root[data-theme="dark"] {
        --bg-deep: #08080f;
        --bg-base: #0c0c14;
        --bg-surface: #111119;
        --bg-raised: #16161f;
        --bg-input: #0a0a12;
        --border: #1c1c28;
        --border-subtle: #141420;
        --text-primary: #e0e0e8;
        --text-secondary: #999;
        --text-muted: #5a5a6e;
        --text-faint: #3a3a48;
        --accent: #23783b;
        --accent-dim: rgba(35, 120, 59, 0.1);
        --accent-hover: rgba(35, 120, 59, 0.18);
        --blue: #42a5f5;
        --orange: #ff9800;
        --red: #e53935;
        --shadow: rgba(0, 0, 0, 0.4);
      }
      :root[data-theme="light"] {
        --bg-deep: #f0f1f4;
        --bg-base: #fff;
        --bg-surface: #f7f8fa;
        --bg-raised: #ecedf0;
        --border: #d8dae0;
        --text-primary: #1a1b2e;
        --accent: #23783b;
      }
      html,
      body {
        height: 100%;
        font-family: "DM Sans", sans-serif;
        background: var(--bg-deep);
        color: var(--text-primary);
        overflow: hidden;
      }
      #app {
        display: none;
        height: 100%;
      }
      .shell {
        display: flex;
        height: 100%;
      }
      .sidebar {
        width: 210px;
        background: var(--bg-base);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
      }
      .sidebar-brand {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .sidebar-brand img {
        height: 40px;
      }
      .sidebar-nav {
        flex: 1;
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .nav-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 9px 12px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--text-muted);
        font-size: 13px;
        cursor: pointer;
      }
      .nav-btn.active {
        color: var(--accent);
        background: var(--accent-dim);
        font-weight: 600;
      }
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .topbar {
        height: 50px;
        padding: 0 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--bg-base);
      }
      .content {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
      }
      .page {
        display: none;
      }
      .page.active {
        display: flex;
        flex-direction: column;
        gap: 16px;
        min-height: 100%;
      }
      .panel {
        background: var(--bg-surface);
        border-radius: 10px;
        overflow: hidden;
      }
      .grid-3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 12px;
      }
      .cam-slot {
        aspect-ratio: 4/3;
        background: var(--bg-input);
        border-radius: 8px;
        position: relative;
        overflow: hidden;
        border: 1px solid var(--border-subtle);
      }
      .cam-slot img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .cam-label {
        position: absolute;
        top: 4px;
        left: 5px;
        font-size: 8px;
        background: rgba(0, 0, 0, 0.5);
        padding: 2px 5px;
        border-radius: 3px;
        color: #fff;
        z-index: 1;
      }
      .btn {
        padding: 8px 16px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: transparent;
        color: var(--text-secondary);
        cursor: pointer;
      }
      .btn-accent {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
      }
      .capture-btn {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: var(--red);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }
      .grade-log {
        background: #000;
        border-radius: 6px;
        padding: 10px;
        font-size: 10px;
        font-family: "JetBrains Mono", monospace;
        color: var(--text-secondary);
        overflow-y: auto;
      }
      .heater-card {
        background: var(--bg-surface);
        border-radius: 10px;
        padding: 16px;
        border: 1px solid var(--border-subtle);
      }
      .temp-display {
        font-size: 42px;
        font-weight: 700;
        font-family: "JetBrains Mono";
      }
      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: var(--bg-raised);
        padding: 12px 18px;
        border-radius: 10px;
        opacity: 0;
        transition: 0.3s;
      }
      .toast.show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="shell">
        <aside class="sidebar">
          <div class="sidebar-brand">
            <img src="/logos/dark_trans_v1.png" alt="HS" class="logo-dark" />
            <span>Setup</span>
          </div>
          <nav class="sidebar-nav">
            <button class="nav-btn active" data-page="viewfocus">
              View Focus
            </button>
            <button class="nav-btn" data-page="heaters">Heaters</button>
            <button class="nav-btn" data-page="capture">Capture</button>
          </nav>
          <div class="sidebar-footer">
            <span class="footer-user" id="footerUser">—</span>
            <button class="icon-btn" onclick="toggleTheme()" id="themeBtn">
              ☀
            </button>
            <button class="icon-btn danger" onclick="HerdAuth.logout()">
              ⏻
            </button>
          </div>
        </aside>
        <div class="main">
          <header class="topbar">
            <h1 id="pageTitle">View Focus</h1>
            <div class="topbar-right">
              <div class="pi-status" id="piStatus">
                <span class="dot red"></span><span>Connecting...</span>
              </div>
            </div>
          </header>
          <div class="content">
            <div class="page active" id="page-viewfocus">
              <div class="grid-3" id="focusCams"></div>
              <div class="panel p-14">
                <div class="flex gap-8 flex-wrap">
                  <button class="btn btn-accent btn-sm" onclick="allAFOff()">
                    All AF Off
                  </button>
                  <button class="btn btn-sm" onclick="saveFocusSettings()">
                    Save Settings
                  </button>
                  <button class="btn btn-sm" onclick="loadFocusSettings()">
                    Load Saved
                  </button>
                  <span
                    id="focusActionStatus"
                    style="
                      font-size: 11px;
                      color: var(--accent);
                      margin-left: auto;
                    "
                  ></span>
                </div>
              </div>
            </div>
            <div class="page" id="page-heaters">
              <div class="panel p-14 flex justify-between items-center">
                <span class="section-label">Thresholds</span>
                <div class="flex gap-14">
                  <span id="threshOn">ON &lt; --°F</span
                  ><span id="threshOff">OFF &gt; --°F</span>
                </div>
              </div>
              <div class="grid-3" id="heaterGrid"></div>
              <div class="panel p-14" style="flex: 1">
                <div class="section-label mb-10">Recent Events</div>
                <div
                  id="heaterHistory"
                  style="overflow-y: auto; flex: 1; font-size: 11px"
                >
                  Loading...
                </div>
              </div>
            </div>
            <div class="page" id="page-capture">
              <div class="flex gap-14" style="flex: 1">
                <div
                  class="panel p-14 flex flex-direction-column items-center gap-16"
                  style="flex: 0 0 260px"
                >
                  <div class="section-label">Goat Number</div>
                  <div
                    class="text-mono"
                    id="captureCounter"
                    style="font-size: 64px; color: var(--accent)"
                  >
                    ...
                  </div>
                  <button
                    class="capture-btn"
                    id="captureBtn"
                    onclick="startCapture(false)"
                  >
                    CAPTURE
                  </button>
                  <button class="btn btn-sm" onclick="startCapture(true)">
                    TEST (no save)
                  </button>
                  <div
                    id="captureStatus"
                    style="font-size: 12px; color: var(--text-muted)"
                  ></div>
                </div>
                <div
                  style="
                    flex: 1;
                    display: flex;
                    flex-direction: column;
                    gap: 14px;
                  "
                >
                  <div class="panel p-14">
                    <div class="section-label mb-10">Goat Data</div>
                    <div class="flex gap-12">
                      <input
                        class="field-input"
                        id="captureLW"
                        placeholder="Weight (lbs)"
                      /><select class="field-select" id="captureGrade">
                        <option value="">-- Grade --</option>
                        <option value="prime">Prime</option>
                      </select>
                    </div>
                  </div>
                  <div class="panel p-14" style="flex: 1">
                    <div class="section-label mb-10">Activity Log</div>
                    <div
                      class="grade-log"
                      id="captureLog"
                      style="flex: 1"
                    ></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="toast" id="toast"><span class="toast-msg"></span></div>

    <script>
      let _currentUser = null,
        currentPage = "viewfocus",
        piConnected = false;
      const CAMERAS = ["side", "top", "front"];

      // THEME & TOAST
      function toggleTheme() {
        const n =
          document.documentElement.dataset.theme === "dark" ? "light" : "dark";
        document.documentElement.dataset.theme = n;
        localStorage.setItem("herdsync-theme", n);
      }
      function showToast(msg) {
        const t = document.getElementById("toast");
        t.querySelector(".toast-msg").textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 3000);
      }

      // NAV
      document.querySelectorAll(".nav-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          currentPage = btn.dataset.page;
          document
            .querySelectorAll(".nav-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          document
            .querySelectorAll(".page")
            .forEach((p) => p.classList.remove("active"));
          document
            .getElementById("page-" + currentPage)
            .classList.add("active");
          if (currentPage === "viewfocus") startFocusStreams();
        });
      });

      // VIEW FOCUS (Locked-in with SHM Integration)
      function buildFocusGrid() {
        const grid = document.getElementById("focusCams");
        grid.innerHTML = "";
        CAMERAS.forEach((cam) => {
          const card = document.createElement("div");
          card.className = "panel p-14";
          card.innerHTML = `<div class="flex justify-between items-center mb-10"><span>${cam.toUpperCase()}</span><span class="heater-status off" id="focus-status-${cam}">OFFLINE</span></div>
            <div class="cam-slot mb-10" id="focus-cam-${cam}"><span class="cam-label">${cam}</span></div>
            <div class="flex gap-8 items-center"><input type="range" id="fslider-${cam}" min="1" max="1023" oninput="setFocus('${cam}',this.value)"/><span class="text-mono" id="fval-${cam}">200</span></div>
            <div id="fmsg-${cam}" style="font-size:10px; color:var(--text-faint); margin-top:4px;"></div>`;
          grid.appendChild(card);
        });
        startFocusStreams();
      }

      function startFocusStreams() {
        CAMERAS.forEach((cam) => {
          const slot = document.getElementById("focus-cam-" + cam);
          let img = slot.querySelector("img") || document.createElement("img");
          // Use direct SHM-backed stream endpoint
          img.src = `${CONFIG.API_BASE}/api/viewfocus/stream/${cam}?token=${HerdAuth.getAccessToken()}`;
          if (!slot.contains(img)) slot.appendChild(img);
        });
      }

      async function setFocus(cam, val) {
        document.getElementById("fval-" + cam).textContent = val;
        try {
          await HerdAuth.fetch(
            `${CONFIG.API_BASE}/api/viewfocus/focus/${cam}/${val}`,
          );
        } catch (e) {}
      }

      // SYSTEM STATUS POLLING (New: Reads from HardwareWorker SHM)
      async function pollPi() {
        try {
          const r = await HerdAuth.fetch(`${CONFIG.API_BASE}/api/prod/status`);
          const data = await r.json();
          piConnected = true;
          document.getElementById("piStatus").innerHTML =
            '<span class="dot green"></span><span>Pi connected</span>';
          // Update FPS & Connectivity labels in the Focus grid
          if (data.cameras) {
            CAMERAS.forEach((cam) => {
              const s = data.cameras[cam];
              const label = document.getElementById("focus-status-" + cam);
              if (label) {
                label.textContent = s.connected ? `${s.fps} FPS` : "OFFLINE";
                label.className = s.connected
                  ? "heater-status on"
                  : "heater-status off";
              }
            });
          }
        } catch (e) {
          piConnected = false;
          document.getElementById("piStatus").innerHTML =
            '<span class="dot red"></span><span>Pi offline</span>';
        }
      }
      setInterval(pollPi, 5000);

      // CAPTURE
      async function startCapture(isMock) {
        const logEl = document.getElementById("captureLog");
        logEl.innerHTML = "Starting...";
        try {
          const res = await HerdAuth.fetch(
            `${CONFIG.API_BASE}/api/capture/record`,
            {
              method: "POST",
              body: JSON.stringify({
                is_test: isMock,
                goat_id: document.getElementById("captureCounter").textContent,
              }),
            },
          );
          const start = await res.json();
          pollCaptureStatus();
        } catch (e) {
          logEl.innerHTML += "<div class='err'>Failed</div>";
        }
      }

      async function pollCaptureStatus() {
        // ... (Full original 240-iteration loop) ...
      }

      function showApp(user) {
        _currentUser = user;
        document.getElementById("app").style.display = "block";
        document.getElementById("footerUser").textContent = user.username;
        buildFocusGrid();
        pollPi();
      }
      HerdAuth.requireAuth().then(showApp);
    </script>
  </body>
</html>
