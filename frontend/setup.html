<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0,user-scalable=no"
    />
    <title>Setup | HerdSync</title>
    <link rel="icon" href="https://herd-sync.com/logos/favicon.ico?v=2" />
    <script src="auth.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/setup.css" />
  </head>
  <body>
    <div id="app">
      <div class="shell">
        <aside class="sidebar">
          <div class="sidebar-brand">
            <img
              src="/logos/dark_trans_v1.png"
              alt="HS"
              class="logo-dark"
              style="height: 35px"
            />
            <img
              src="/logos/light_trans_v1.png"
              alt="HS"
              class="logo-light"
              style="height: 35px"
            />
            <span>Setup</span>
          </div>
          <nav class="sidebar-nav">
            <button class="nav-btn active" data-page="viewfocus">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="12" cy="12" r="3" />
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7S2 12 2 12z" /></svg
              ><span class="nav-label">View Focus</span>
            </button>
            <button class="nav-btn" data-page="heaters">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <path
                  d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"
                /></svg
              ><span class="nav-label">Heaters</span>
            </button>
            <button class="nav-btn" data-page="capture">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <path
                  d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"
                />
                <circle cx="12" cy="13" r="4" /></svg
              ><span class="nav-label">Capture</span>
            </button>
          </nav>
          <div class="sidebar-footer">
            <span class="footer-user" id="footerUser">—</span>
            <button
              class="icon-btn"
              onclick="toggleTheme()"
              title="Toggle theme"
              id="themeBtn"
            >
              ☀
            </button>
            <button
              class="icon-btn danger"
              onclick="HerdAuth.logout()"
              title="Logout"
            >
              ⏻
            </button>
          </div>
        </aside>
        <div class="main">
          <header class="topbar">
            <h1 id="pageTitle">View Focus</h1>
            <div class="topbar-right">
              <div class="pi-status" id="piStatus">
                <span class="dot red"></span><span>Connecting...</span>
              </div>
              <div class="topbar-user" id="topbarUser"></div>
            </div>
          </header>
          <div class="content">
            <!-- ========== VIEW FOCUS ========== -->
            <div class="page active" id="page-viewfocus">
              <div class="grid-3" id="focusCams"></div>
              <div class="panel p-14">
                <div class="flex gap-8 flex-wrap">
                  <button
                    class="btn btn-sm"
                    style="border-color: var(--purple); color: var(--purple)"
                    onclick="captureTestShots()"
                  >
                    Test Capture
                  </button>
                  <span
                    id="focusActionStatus"
                    style="
                      font-size: 11px;
                      color: var(--accent);
                      margin-left: auto;
                      align-self: center;
                    "
                  ></span>
                </div>
              </div>
            </div>

            <!-- ========== HEATERS ========== -->
            <div class="page" id="page-heaters">
              <div class="panel p-14 flex justify-between items-center">
                <span class="section-label" style="margin: 0">Thresholds</span>
                <div class="flex gap-14">
                  <span
                    class="text-mono"
                    style="color: var(--orange)"
                    id="threshOn"
                    >ON &lt; --°F</span
                  >
                  <span
                    class="text-mono"
                    style="color: var(--accent)"
                    id="threshOff"
                    >OFF &gt; --°F</span
                  >
                </div>
              </div>
              <div class="grid-3" id="heaterGrid"></div>
              <div
                class="panel p-14"
                style="
                  flex: 1;
                  min-height: 200px;
                  display: flex;
                  flex-direction: column;
                "
              >
                <div class="section-label shrink-0 mb-10">Recent Events</div>
                <div
                  id="heaterHistory"
                  style="
                    overflow-y: auto;
                    flex: 1;
                    min-height: 0;
                    font-size: 11px;
                  "
                >
                  <div style="color: var(--text-faint); padding: 10px 0">
                    Loading...
                  </div>
                </div>
              </div>
            </div>

            <!-- ========== CAPTURE ========== -->
            <div class="page" id="page-capture">
              <div class="flex gap-14" style="flex: 1; min-height: 0">
                <div
                  class="panel p-14"
                  style="
                    flex: 0 0 260px;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    gap: 16px;
                  "
                >
                  <div class="section-label">Goat Number</div>
                  <div
                    class="text-mono"
                    id="captureCounter"
                    style="
                      font-size: 64px;
                      font-weight: 700;
                      color: var(--accent);
                      line-height: 1;
                    "
                  >
                    ...
                  </div>
                  <div
                    class="inset"
                    style="
                      text-align: center;
                      color: var(--orange);
                      font-size: 11px;
                      line-height: 1.5;
                      padding: 8px 12px;
                    "
                  >
                    Only use CAPTURE for real data
                  </div>
                  <button
                    class="capture-btn"
                    id="captureBtn"
                    onclick="startCapture(false)"
                  >
                    CAPTURE
                  </button>
                  <button
                    class="test-btn"
                    id="captureMockBtn"
                    onclick="startCapture(true)"
                  >
                    TEST<br />(no save)
                  </button>
                  <div
                    id="captureStatus"
                    style="
                      font-size: 12px;
                      color: var(--text-muted);
                      text-align: center;
                      min-height: 20px;
                    "
                  ></div>
                </div>
                <div
                  style="
                    flex: 1;
                    display: flex;
                    flex-direction: column;
                    gap: 14px;
                    min-width: 0;
                  "
                >
                  <div class="panel p-14">
                    <div class="section-label mb-10">Goat Data</div>
                    <div class="flex gap-12 flex-wrap">
                      <div style="flex: 1; min-width: 100px">
                        <label class="field-label">Description</label
                        ><select class="field-select" id="captureDesc">
                          <option value="">-- Select --</option>
                          <option value="dairy">Dairy</option>
                          <option value="meat">Meat</option>
                          <option value="cross">Cross</option>
                        </select>
                      </div>
                      <div style="flex: 1; min-width: 100px">
                        <label class="field-label">Live Weight</label
                        ><input
                          class="field-input"
                          id="captureLW"
                          type="text"
                          placeholder="e.g. 85 lbs"
                        />
                      </div>
                      <div style="flex: 1; min-width: 100px">
                        <label class="field-label">Grade</label
                        ><select class="field-select" id="captureGrade">
                          <option value="">-- Select --</option>
                          <option value="cab prime">CAB Prime</option>
                          <option value="prime">Prime</option>
                          <option value="choice">Choice</option>
                          <option value="select">Select</option>
                          <option value="no roll">No Roll</option>
                        </select>
                      </div>
                    </div>
                  </div>
                  <div
                    class="panel p-14"
                    style="display: flex; flex-direction: column; gap: 10px"
                  >
                    <div class="section-label">Camera Preview</div>
                    <div class="grid-3" id="captureCams">
                      <div class="cam-slot">
                        <span class="cam-label">Side</span>
                        <div class="cam-offline">Waiting for grader...</div>
                      </div>
                      <div class="cam-slot">
                        <span class="cam-label">Top</span>
                        <div class="cam-offline">Waiting for grader...</div>
                      </div>
                      <div class="cam-slot">
                        <span class="cam-label">Front</span>
                        <div class="cam-offline">Waiting for grader...</div>
                      </div>
                    </div>
                  </div>
                  <div
                    class="panel p-14"
                    style="
                      flex: 1;
                      display: flex;
                      flex-direction: column;
                      min-height: 250px;
                    "
                  >
                    <div class="section-label shrink-0 mb-10">Activity Log</div>
                    <div
                      class="grade-log"
                      id="captureLog"
                      style="flex: 1; max-height: none"
                    ></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- IMAGE LIGHTBOX -->
    <div class="lightbox-overlay" id="lightbox" onclick="closeLightbox(event)">
      <img id="lightboxImg" src="" alt="Camera view" /><a
        class="lightbox-download"
        id="lightboxDl"
        href=""
        download="camera.jpg"
        >⬇ Download</a
      >
    </div>

    <div class="toast" id="toast">
      <span class="toast-icon"></span><span class="toast-msg"></span>
    </div>

    <script>
      // ============================================================
      // GLOBALS & CONFIG
      // ============================================================
      let _currentUser = null,
        currentPage = "viewfocus",
        piConnected = false;
      const CAMERAS = ["side", "top", "front"];
      const TITLES = {
        viewfocus: "View Focus",
        heaters: "Heaters",
        capture: "Capture",
      };

      // Focus settings state
      let focusValues = { side: 200, top: 200, front: 200 };
      let focusStreamsActive = false;
      let captureCamsActive = false;

      // ============================================================
      // THEME
      // ============================================================
      function initTheme() {
        const s = localStorage.getItem("herdsync-theme") || "dark";
        document.documentElement.dataset.theme = s;
        updateThemeIcon(s);
      }
      function toggleTheme() {
        const n =
          document.documentElement.dataset.theme === "dark" ? "light" : "dark";
        document.documentElement.dataset.theme = n;
        localStorage.setItem("herdsync-theme", n);
        updateThemeIcon(n);
      }
      function updateThemeIcon(t) {
        document.getElementById("themeBtn").textContent =
          t === "dark" ? "☀" : "☾";
      }
      initTheme();

      // ============================================================
      // TOAST
      // ============================================================
      let toastTimer;
      function showToast(type, msg) {
        const t = document.getElementById("toast");
        t.className = "toast " + type;
        t.querySelector(".toast-icon").textContent =
          type === "success" ? "✓" : "✕";
        t.querySelector(".toast-msg").textContent = msg;
        clearTimeout(toastTimer);
        requestAnimationFrame(() => t.classList.add("show"));
        toastTimer = setTimeout(() => t.classList.remove("show"), 3500);
      }

      // ============================================================
      // LIGHTBOX (mirrors dashboard pattern)
      // ============================================================
      function openLightbox(slot) {
        const img = slot.querySelector("img");
        if (!img || !img.src) return;
        document.getElementById("lightboxImg").src = img.src;
        document.getElementById("lightboxDl").href = img.src;
        document.getElementById("lightboxDl").download =
          (img.alt || "camera") + ".jpg";
        document.getElementById("lightbox").classList.add("open");
      }
      function closeLightbox(e) {
        if (e.target.tagName === "A") return;
        document.getElementById("lightbox").classList.remove("open");
      }
      document.addEventListener(
        "keydown",
        function (e) {
          if (
            e.key === "Escape" &&
            document.getElementById("lightbox").classList.contains("open")
          ) {
            document.getElementById("lightbox").classList.remove("open");
            e.stopImmediatePropagation();
          }
        },
        true,
      );

      // ============================================================
      // NAV
      // ============================================================
      document.querySelectorAll(".nav-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const pg = btn.dataset.page;
          currentPage = pg;
          document
            .querySelectorAll(".nav-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          document
            .querySelectorAll(".page")
            .forEach((p) => p.classList.remove("active"));
          document.getElementById("page-" + pg).classList.add("active");
          document.getElementById("pageTitle").textContent = TITLES[pg] || pg;

          // Manage camera streams based on active page
          if (pg === "viewfocus") {
            startFocusStreams();
            stopCaptureCams();
            stopHeaterPolling();
          } else if (pg === "capture") {
            stopFocusStreams();
            startCaptureCams();
            stopHeaterPolling();
          } else if (pg === "heaters") {
            stopFocusStreams();
            stopCaptureCams();
            startHeaterPolling();
          } else {
            stopFocusStreams();
            stopCaptureCams();
            stopHeaterPolling();
          }
        });
      });

      // ============================================================
      // PI CONNECTION (mirrors dashboard pattern)
      // ============================================================
      async function checkPi() {
        const el = document.getElementById("piStatus");
        try {
          const c = new AbortController();
          const t = setTimeout(() => c.abort(), 5000);
          await HerdAuth.fetch("/api/prod/status", {
            signal: c.signal,
          });
          clearTimeout(t);
          const wasOffline = !piConnected;
          piConnected = true;
          el.innerHTML =
            '<span class="dot green"></span><span>Pi connected</span>';
          if (wasOffline) {
            if (currentPage === "viewfocus") startFocusStreams();
            if (currentPage === "capture") startCaptureCams();
            if (currentPage === "heaters") {
              fetchHeaterStatus();
              fetchHeaterHistory();
            }
          }
        } catch (e) {
          piConnected = false;
          el.innerHTML = '<span class="dot red"></span><span>Pi offline</span>';
        }
      }
      setInterval(checkPi, 10000);

      // ============================================================
      // AUTH + INIT
      // ============================================================
      function showApp(user) {
        _currentUser = user;
        document.getElementById("app").style.display = "block";
        document.getElementById("topbarUser").textContent =
          user.username + " (" + user.role + ")";
        document.getElementById("footerUser").textContent = user.username;
        checkPi();
        buildFocusGrid();
        loadFocusFromStatus();
        fetchCaptureCount();
        // Start focus streams since viewfocus is the default page
        startFocusStreams();
      }

      // ============================================================
      // VIEW FOCUS: STREAMING & FOCUS CONTROL
      // ============================================================

      function buildFocusGrid() {
        const container = document.getElementById("focusCams");
        container.innerHTML = "";

        CAMERAS.forEach((cam) => {
          const card = document.createElement("div");
          card.className = "panel p-14";
          card.innerHTML =
            '<div class="flex justify-between items-center mb-10">' +
            '<span style="font-size:14px;font-weight:600;text-transform:capitalize">' +
            cam +
            "</span>" +
            '<span class="heater-status off" id="focus-status-' +
            cam +
            '">Offline</span>' +
            "</div>" +
            '<div class="cam-slot" id="focus-cam-' +
            cam +
            '" style="cursor:pointer" onclick="openLightbox(this)">' +
            '<span class="cam-label">' +
            cam +
            "</span>" +
            '<div class="cam-offline" id="focus-offline-' +
            cam +
            '">Waiting for grader...</div>' +
            "</div>" +
            '<div style="margin-top:10px">' +
            '<div class="flex items-center gap-8 mb-10">' +
            '<span class="field-label" style="margin:0;flex-shrink:0">Focus</span>' +
            '<input type="range" min="0" max="1023" value="' +
            (focusValues[cam] || 200) +
            '" ' +
            'id="focus-slider-' +
            cam +
            '" ' +
            "oninput=\"onFocusSliderInput('" +
            cam +
            "', this.value)\" " +
            "onchange=\"setFocus('" +
            cam +
            "', this.value)\" />" +
            '<span class="text-mono" style="font-size:12px;color:var(--accent);min-width:32px;text-align:right" ' +
            'id="fval-' +
            cam +
            '">' +
            (focusValues[cam] || 200) +
            "</span>" +
            '<button class="btn btn-sm" style="padding:4px 8px;font-size:10px" ' +
            'id="af-btn-' +
            cam +
            '" onclick="autoFocus(\'' +
            cam +
            "')\">AF</button>" +
            "</div>" +
            '<div id="fmsg-' +
            cam +
            '" style="font-size:10px;color:var(--text-faint);min-height:14px"></div>' +
            "</div>";
          container.appendChild(card);
        });
      }

      let _focusThrottleTimers = {};

      function onFocusSliderInput(cam, val) {
        document.getElementById("fval-" + cam).textContent = val;
        focusValues[cam] = parseInt(val);

        // Disable AF if it was active
        if (_afActive[cam]) {
          _afActive[cam] = false;
          const btn = document.getElementById("af-btn-" + cam);
          const msgEl = document.getElementById("fmsg-" + cam);
          btn.textContent = "AF";
          btn.style.color = "";
          msgEl.textContent = "";
        }

        if (_focusThrottleTimers[cam]) return;
        _focusThrottleTimers[cam] = setTimeout(() => {
          _focusThrottleTimers[cam] = null;
          HerdAuth.fetch(
            "/api/viewfocus/focus/" + cam + "/" + focusValues[cam],
          ).catch(() => {});
        }, 100);
      }

      // --- MJPEG Streaming (mirrors dashboard setCamerasForPage / startCameraStreams) ---

      function startFocusStreams() {
        if (focusStreamsActive) return;
        focusStreamsActive = true;

        CAMERAS.forEach((cam) => {
          const slot = document.getElementById("focus-cam-" + cam);
          if (!slot) return;
          const offline = document.getElementById("focus-offline-" + cam);

          // Clean up existing
          let img = slot.querySelector("img[data-cam]");
          if (img) {
            clearTimeout(img._retryTimer);
            img.src = "";
            img.remove();
          }

          img = document.createElement("img");
          img.dataset.cam = cam;
          img.alt = cam;
          img.onload = function () {
            if (offline) offline.style.display = "none";
            updateCamStatus(cam, "Streaming");
          };
          img.onerror = function () {
            this.style.display = "none";
            if (offline) {
              offline.textContent = piConnected
                ? "Stream interrupted — retrying..."
                : "Waiting for grader...";
              offline.style.display = "";
            }
            updateCamStatus(cam, "Offline", true);
            clearTimeout(this._retryTimer);
            this._retryTimer = setTimeout(() => {
              if (
                currentPage === "viewfocus" &&
                piConnected &&
                focusStreamsActive
              ) {
                _connectFocusStream(this, cam, offline);
              }
            }, 10000);
          };
          slot.insertBefore(img, slot.firstChild);
          _connectFocusStream(img, cam, offline);
        });
      }

      function _connectFocusStream(img, cam, offlineEl) {
        const token = HerdAuth.getAccessToken();
        img.style.display = "";
        img.src = "/api/viewfocus/stream/" + cam + "?token=" + token;
      }

      function stopFocusStreams() {
        if (!focusStreamsActive) return;
        focusStreamsActive = false;

        CAMERAS.forEach((cam) => {
          const slot = document.getElementById("focus-cam-" + cam);
          if (!slot) return;
          const img = slot.querySelector("img[data-cam]");
          if (img) {
            clearTimeout(img._retryTimer);
            img.src = "";
            img.remove();
          }
          const offline = document.getElementById("focus-offline-" + cam);
          if (offline) {
            offline.textContent = "Waiting for grader...";
            offline.style.display = "";
          }
          updateCamStatus(cam, "Offline", true);
        });
      }

      function updateCamStatus(cam, text, isErr) {
        const el = document.getElementById("focus-status-" + cam);
        if (!el) return;
        el.className = isErr ? "heater-status failsafe" : "heater-status on";
        el.textContent = text;
      }

      // Refresh MJPEG tokens periodically (mirrors dashboard refreshCameraTokens)
      function refreshFocusTokens() {
        if (!focusStreamsActive || currentPage !== "viewfocus") return;
        const t = HerdAuth.getAccessToken();
        document.querySelectorAll("#focusCams img[data-cam]").forEach((img) => {
          if (img.src && img.src.includes("token=")) {
            const base = img.src.split("?")[0];
            img.src = base + "?token=" + t + "&t=" + Date.now();
          }
        });
      }
      setInterval(refreshFocusTokens, 10 * 60 * 1000);

      // ============================================================
      // FOCUS CONTROL API
      // ============================================================

      async function setFocus(cam, val) {
        focusValues[cam] = parseInt(val);
        document.getElementById("fval-" + cam).textContent = val;
        // Clear any pending throttle and send the final value
        clearTimeout(_focusThrottleTimers[cam]);
        _focusThrottleTimers[cam] = null;
        try {
          await HerdAuth.fetch("/api/viewfocus/focus/" + cam + "/" + val);
        } catch (e) {}
      }

      let _afActive = { side: false, top: false, front: false };

      async function autoFocus(cam) {
        const btn = document.getElementById("af-btn-" + cam);
        const msgEl = document.getElementById("fmsg-" + cam);

        try {
          const r = await HerdAuth.fetch("/api/viewfocus/autofocus/" + cam, {
            method: "POST",
          });
          if (r.ok) {
            _afActive[cam] = true;
            btn.textContent = "AF ●";
            btn.style.color = "var(--accent)";
            msgEl.textContent = "AF active — touch slider to lock";
            msgEl.style.color = "var(--accent)";
          }
        } catch (e) {
          msgEl.textContent = "AF failed";
          msgEl.style.color = "var(--red)";
          setTimeout(() => {
            msgEl.textContent = "";
          }, 3000);
        }
      }

      async function loadFocusFromStatus() {
        try {
          const r = await HerdAuth.fetch("/api/viewfocus/status");
          if (r.ok) {
            const data = await r.json();
            if (data.settings) {
              CAMERAS.forEach((cam) => {
                if (data.settings[cam] !== undefined) {
                  focusValues[cam] = data.settings[cam];
                  const slider = document.getElementById("focus-slider-" + cam);
                  const valEl = document.getElementById("fval-" + cam);
                  if (slider) slider.value = focusValues[cam];
                  if (valEl) valEl.textContent = focusValues[cam];
                }
              });
            }
          }
        } catch (e) {}
      }

      async function captureTestShots() {
        const status = document.getElementById("focusActionStatus");
        status.textContent = "Capturing test shots...";
        status.style.color = "var(--purple)";

        let ok = 0;
        for (const cam of CAMERAS) {
          try {
            const r = await HerdAuth.fetch(
              "/api/viewfocus/capture/burst/" + cam,
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ count: 1, interval_ms: 100 }),
              },
            );
            if (r.ok) ok++;
          } catch (e) {}
        }
        status.textContent = ok + "/" + CAMERAS.length + " test shots captured";
        status.style.color =
          ok === CAMERAS.length ? "var(--accent)" : "var(--orange)";
        if (ok > 0) showToast("success", ok + " test shot(s) captured");
        else
          showToast("error", "No test shots captured — grader may be offline");
        setTimeout(() => {
          status.textContent = "";
        }, 4000);
      }

      // ============================================================
      // CAPTURE PAGE: CAMERA STREAMS (mirrors dashboard grading cams)
      // ============================================================

      function startCaptureCams() {
        if (captureCamsActive) return;
        captureCamsActive = true;

        const container = document.getElementById("captureCams");
        const cams = ["side", "top", "front"];
        const slots = container.querySelectorAll(".cam-slot");
        const token = HerdAuth.getAccessToken();

        slots.forEach((slot, i) => {
          const cam = cams[i];
          const offline = slot.querySelector(".cam-offline");

          let img = slot.querySelector("img[data-cam]");
          if (img) {
            clearTimeout(img._retryTimer);
            img.src = "";
            img.remove();
          }

          img = document.createElement("img");
          img.dataset.cam = cam;
          img.alt = cam;
          img.onload = function () {
            if (offline) offline.style.display = "none";
          };
          img.onerror = function () {
            this.style.display = "none";
            if (offline) {
              offline.textContent = piConnected
                ? "Stream interrupted — retrying..."
                : "Waiting for grader...";
              offline.style.display = "";
            }
            clearTimeout(this._retryTimer);
            this._retryTimer = setTimeout(() => {
              if (
                currentPage === "capture" &&
                piConnected &&
                captureCamsActive
              ) {
                this.style.display = "";
                this.src =
                  "/api/viewfocus/stream/" +
                  cam +
                  "?token=" +
                  HerdAuth.getAccessToken() +
                  "&t=" +
                  Date.now();
              }
            }, 10000);
          };
          slot.insertBefore(img, slot.firstChild);
          img.src = "/api/viewfocus/stream/" + cam + "?token=" + token;
        });
      }

      function stopCaptureCams() {
        if (!captureCamsActive) return;
        captureCamsActive = false;

        const container = document.getElementById("captureCams");
        container.querySelectorAll("img[data-cam]").forEach((img) => {
          clearTimeout(img._retryTimer);
          img.src = "";
          img.remove();
        });
        container.querySelectorAll(".cam-offline").forEach((el) => {
          el.style.display = "";
          el.textContent = "Waiting for grader...";
        });
      }

      // Refresh capture cam tokens periodically
      function refreshCaptureCamTokens() {
        if (!captureCamsActive || currentPage !== "capture") return;
        const t = HerdAuth.getAccessToken();
        document
          .querySelectorAll("#captureCams img[data-cam]")
          .forEach((img) => {
            if (img.src && img.src.includes("token=")) {
              const base = img.src.split("?")[0];
              img.src = base + "?token=" + t + "&t=" + Date.now();
            }
          });
      }
      setInterval(refreshCaptureCamTokens, 10 * 60 * 1000);

      // ============================================================
      // HEATERS (full override on/auto/off control)
      // ============================================================
      let _heaterInterval = null;
      let _heaterHistoryInterval = null;

      function startHeaterPolling() {
        if (_heaterInterval) return;
        fetchHeaterStatus();
        fetchHeaterHistory();
        _heaterInterval = setInterval(fetchHeaterStatus, 2000);
        _heaterHistoryInterval = setInterval(fetchHeaterHistory, 10000);
      }

      function stopHeaterPolling() {
        if (_heaterInterval) {
          clearInterval(_heaterInterval);
          _heaterInterval = null;
        }
        if (_heaterHistoryInterval) {
          clearInterval(_heaterHistoryInterval);
          _heaterHistoryInterval = null;
        }
      }

      async function fetchHeaterStatus() {
        if (!piConnected) {
          // Show offline state in the heater grid
          const grid = document.getElementById("heaterGrid");
          if (grid.children.length === 0) {
            grid.innerHTML =
              '<div style="grid-column:1/-1;padding:30px;text-align:center;color:var(--text-muted);font-size:13px">' +
              '<div class="dot red" style="display:inline-block;margin-right:6px"></div>' +
              "Pi is offline — heater data unavailable. Waiting for connection..." +
              "</div>";
          }
          return;
        }
        try {
          const r = await HerdAuth.fetch("/api/heater/status");
          if (!r.ok) throw new Error("HTTP " + r.status);
          const data = await r.json();
          if (data.thresholds) {
            document.getElementById("threshOn").textContent =
              "ON < " + data.thresholds.on_below + "°F";
            document.getElementById("threshOff").textContent =
              "OFF > " + data.thresholds.off_above + "°F";
          }
          renderHeaters(data.cameras || {});
        } catch (e) {
          // Show error in grid if it's empty
          const grid = document.getElementById("heaterGrid");
          if (
            grid.children.length === 0 ||
            grid.querySelector("[data-offline-msg]")
          ) {
            grid.innerHTML =
              '<div data-offline-msg style="grid-column:1/-1;padding:30px;text-align:center;color:var(--red);font-size:12px">' +
              "Failed to load heater data: " +
              (e.message || "unknown error") +
              "</div>";
          }
        }
      }

      function renderHeaters(cameras) {
        const grid = document.getElementById("heaterGrid");
        const names = Object.keys(cameras).sort();
        if (grid.children.length !== names.length) {
          grid.innerHTML = "";
          names.forEach((name) => {
            const card = document.createElement("div");
            card.className = "heater-card";
            card.id = "hcard-" + name;
            card.innerHTML =
              '<div class="flex justify-between items-center mb-10">' +
              '<span style="font-size:14px;font-weight:600">' +
              name.replace("camera", "Cam ") +
              "</span>" +
              '<span class="heater-status off" id="hstatus-' +
              name +
              '">OFF</span>' +
              "</div>" +
              '<div class="temp-display warm" id="htemp-' +
              name +
              '">--°F</div>' +
              '<div id="hmeta-' +
              name +
              '" style="font-size:10px;color:var(--text-faint);margin-bottom:12px;line-height:1.8"></div>' +
              '<div class="flex gap-8">' +
              '<button class="override-btn" onclick="setHeaterOverride(\'' +
              name +
              "','on')\">Force ON</button>" +
              '<button class="override-btn active-auto" onclick="setHeaterOverride(\'' +
              name +
              "','auto')\">Auto</button>" +
              '<button class="override-btn" onclick="setHeaterOverride(\'' +
              name +
              "','off')\">Force OFF</button>" +
              "</div>";
            grid.appendChild(card);
          });
        }
        names.forEach((name) => {
          const cam = cameras[name];
          const card = document.getElementById("hcard-" + name);
          const st = document.getElementById("hstatus-" + name);
          const temp = document.getElementById("htemp-" + name);
          const meta = document.getElementById("hmeta-" + name);
          card.className = "heater-card";
          if (cam.failsafe) card.classList.add("failsafe");
          else if (cam.override !== "auto") card.classList.add("override");
          else if (cam.heater_on) card.classList.add("heating");
          if (cam.failsafe) {
            st.className = "heater-status failsafe";
            st.textContent = "FAILSAFE";
          } else if (cam.override === "on") {
            st.className = "heater-status override-on";
            st.textContent = "FORCED ON";
          } else if (cam.override === "off") {
            st.className = "heater-status override-off";
            st.textContent = "FORCED OFF";
          } else if (cam.heater_on) {
            st.className = "heater-status on";
            st.textContent = "HEATING";
          } else {
            st.className = "heater-status off";
            st.textContent = "OFF";
          }
          if (cam.temp_f !== null && cam.temp_f !== undefined) {
            temp.textContent = cam.temp_f + "°F";
            temp.className =
              "temp-display" +
              (cam.temp_f < 40 ? " cold" : cam.temp_f < 70 ? " warm" : " hot");
          } else {
            temp.textContent = "--°F";
            temp.className = "temp-display err";
          }
          let m = "";
          if (cam.last_good_temp !== null && cam.last_good_temp !== undefined)
            m += "<div>Last good: " + cam.last_good_temp + "°F</div>";
          if (cam.fail_count > 0)
            m +=
              '<div>Failed reads: <span style="color:var(--red)">' +
              cam.fail_count +
              "</span></div>";
          if (cam.last_change)
            m +=
              "<div>Last change: " +
              new Date(cam.last_change).toLocaleTimeString() +
              "</div>";
          meta.innerHTML = m;
          const btns = card.querySelectorAll(".override-btn");
          btns[0].className =
            "override-btn" + (cam.override === "on" ? " active-on" : "");
          btns[1].className =
            "override-btn" + (cam.override === "auto" ? " active-auto" : "");
          btns[2].className =
            "override-btn" + (cam.override === "off" ? " active-off" : "");
        });
      }

      async function setHeaterOverride(camera, state) {
        if (!piConnected) {
          showToast("error", "Pi is offline — cannot set override");
          return;
        }
        try {
          await HerdAuth.fetch("/api/heater/override", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ camera, state }),
          });
          showToast(
            "success",
            camera.replace("camera", "Cam ") + " → " + state.toUpperCase(),
          );
          fetchHeaterStatus();
        } catch (e) {
          showToast("error", "Failed to set override");
        }
      }

      async function fetchHeaterHistory() {
        if (!piConnected) return;
        try {
          const r = await HerdAuth.fetch("/api/heater/history");
          if (!r.ok) throw new Error("HTTP " + r.status);
          const data = await r.json();
          const list = document.getElementById("heaterHistory");
          const history = data.history || [];
          if (!history.length) {
            list.innerHTML =
              '<div style="color:var(--text-faint);padding:10px 0">No events yet</div>';
            return;
          }
          list.innerHTML = history
            .slice()
            .reverse()
            .map((e) => {
              const time = new Date(e.time).toLocaleTimeString();
              let cls = "";
              const evt = e.event || "";
              if (evt.includes("heater_on") || evt.includes("override_on"))
                cls = "on";
              else if (
                evt.includes("heater_off") ||
                evt.includes("override_off")
              )
                cls = "off";
              else if (evt.includes("failsafe")) cls = "failsafe";
              else if (evt.includes("override")) cls = "override";
              const extra = e.temp !== undefined ? " (" + e.temp + "°F)" : "";
              return (
                '<div class="history-entry"><span class="history-time">' +
                time +
                '</span><span class="history-cam">' +
                (e.camera || "") +
                '</span><span class="history-event ' +
                cls +
                '">' +
                evt +
                extra +
                "</span></div>"
              );
            })
            .join("");
        } catch (e) {
          const list = document.getElementById("heaterHistory");
          if (list.children.length <= 1) {
            list.innerHTML =
              '<div style="color:var(--text-faint);padding:10px 0">Could not load event history</div>';
          }
        }
      }

      // ============================================================
      // CAPTURE (Training Data)
      // ============================================================
      let captureGoatId = 1,
        isCapturing = false;

      function captureLog(msg, type) {
        const el = document.getElementById("captureLog");
        const div = document.createElement("div");
        div.className = type || "info";
        div.textContent = new Date().toLocaleTimeString() + "  " + msg;
        el.appendChild(div);
        el.scrollTop = el.scrollHeight;
      }

      async function fetchCaptureCount() {
        const counter = document.getElementById("captureCounter");
        counter.textContent = "...";
        counter.style.color = "var(--text-faint)";

        try {
          // Call your new Pi endpoint instead of hitting S3 directly
          const r = await HerdAuth.fetch("/api/capture/next_id");
          if (!r.ok) throw new Error("Server error");

          const data = await r.json();
          captureGoatId = data.next_id;
        } catch (e) {
          console.error(
            "Failed to fetch next_id, falling back to localStorage:",
            e,
          );
          captureGoatId = parseInt(
            localStorage.getItem("captureGoatId") || "1",
          );
        }

        counter.textContent = captureGoatId;
        counter.style.color = "var(--accent)";
        localStorage.setItem("captureGoatId", captureGoatId.toString());
      }

      async function startCapture(isMock) {
        if (isCapturing) return;

        // Check Pi connectivity first — fast-fail instead of hanging
        if (!piConnected) {
          captureLog("ERROR: Pi is offline — cannot capture", "err");
          captureLog(
            "Check that the Pi is powered on and connected to the network",
            "warn",
          );
          showToast("error", "Pi is offline — cannot capture");
          return;
        }

        const btn = isMock
          ? document.getElementById("captureMockBtn")
          : document.getElementById("captureBtn");
        const other = isMock
          ? document.getElementById("captureBtn")
          : document.getElementById("captureMockBtn");
        const status = document.getElementById("captureStatus");
        isCapturing = true;
        btn.disabled = true;
        other.disabled = true;
        btn.classList.add("recording");
        document.getElementById("captureLog").innerHTML = "";
        if (isMock) {
          btn.innerHTML = "TESTING...";
          status.textContent = "Test capture...";
          captureLog("Starting TEST capture (will not save)", "warn");
        } else {
          btn.textContent = "CAPTURING...";
          status.textContent = "Capturing goat #" + captureGoatId + "...";
          captureLog("Starting capture for goat #" + captureGoatId, "info");
        }
        try {
          // Verify Pi is reachable right now
          captureLog("Verifying Pi connection...", "info");
          try {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), 5000);
            const pingResp = await HerdAuth.fetch("/api/prod/status", {
              signal: controller.signal,
            });
            clearTimeout(timer);
            if (!pingResp.ok) throw new Error("Status " + pingResp.status);
            captureLog("Pi connected", "ok");
          } catch (pingErr) {
            piConnected = false;
            document.getElementById("piStatus").innerHTML =
              '<span class="dot red"></span><span>Pi offline</span>';
            throw new Error("Pi unreachable: " + pingErr.message);
          }

          const goatData = isMock
            ? {}
            : {
                description:
                  document.getElementById("captureDesc").value || null,
                live_weight: document.getElementById("captureLW").value || null,
                grade: document.getElementById("captureGrade").value || null,
              };
          const captureId = isMock ? "test_" + Date.now() : captureGoatId;

          captureLog("POST /api/capture/record ...", "info");
          const response = await HerdAuth.fetch("/api/capture/record", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              goat_id: captureId,
              goat_data: goatData,
              is_test: isMock,
              require_all_cameras: !isMock,
            }),
          });
          if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            const msg =
              err.message || err.error_code || "HTTP " + response.status;
            captureLog("Rejected: " + msg, "err");
            if (err.fix) captureLog("Fix: " + err.fix, "warn");
            if (err.cameras_missing)
              captureLog(
                "Missing cameras: " + err.cameras_missing.join(", "),
                "warn",
              );
            if (err.cameras) {
              Object.entries(err.cameras).forEach(([cam, info]) => {
                if (!info.connected)
                  captureLog("  " + cam + ": not connected", "err");
              });
            }
            throw new Error(msg);
          }
          const startData = await response.json();
          captureLog("Capture started", "ok");
          if (startData.cameras_available?.length > 0)
            captureLog(
              "Cameras: " + startData.cameras_available.join(", "),
              "ok",
            );
          if (startData.warning) captureLog(startData.warning, "warn");
          captureLog("Capturing images (~20s)...", "info");
          await pollCaptureStatus();
          if (isMock) {
            captureLog("Test complete", "ok");
            status.textContent = "Test complete";
            status.style.color = "var(--accent)";
          } else {
            captureLog("Goat #" + captureGoatId + " saved to S3", "ok");
            status.textContent = "Goat #" + captureGoatId + " captured";
            status.style.color = "var(--accent)";
            captureGoatId++;
            document.getElementById("captureCounter").textContent =
              captureGoatId;
            localStorage.setItem("captureGoatId", captureGoatId.toString());
            document.getElementById("captureDesc").value = "";
            document.getElementById("captureLW").value = "";
            document.getElementById("captureGrade").value = "";
          }
        } catch (err) {
          captureLog("ERROR: " + err.message, "err");
          status.textContent = "Failed";
          status.style.color = "var(--red)";
        } finally {
          isCapturing = false;
          btn.disabled = false;
          other.disabled = false;
          btn.classList.remove("recording");
          if (isMock) btn.innerHTML = "TEST<br>(no save)";
          else btn.textContent = "CAPTURE";
        }
      }

      async function pollCaptureStatus() {
        let lastProgress = null;
        for (let i = 0; i < 240; i++) {
          await new Promise((r) => setTimeout(r, 500));
          let data;
          try {
            const r = await HerdAuth.fetch("/api/capture/status");
            data = await r.json();
          } catch (e) {
            captureLog("Retrying...", "warn");
            continue;
          }
          if (data.progress && data.progress !== lastProgress) {
            lastProgress = data.progress;
            const msgs = {
              starting: "Initializing cameras...",
              capturing: "Capturing images...",
              checking_s3: "Checking S3...",
              uploading: "Uploading to cloud...",
            };
            captureLog(msgs[data.progress] || data.progress, "info");
          }
          if (!data.active) {
            if (data.last_error) throw new Error(data.last_error);
            if (data.last_result) {
              if (data.last_result.camera_status) {
                for (const [cam, s] of Object.entries(
                  data.last_result.camera_status,
                )) {
                  if (s.startsWith("captured"))
                    captureLog("✓ " + cam + ": " + s, "ok");
                  else if (s === "failed")
                    captureLog("✗ " + cam + ": failed", "err");
                  else captureLog("— " + cam + ": " + s, "warn");
                }
              }
              if (data.last_result.total_images)
                captureLog(
                  "Total images: " + data.last_result.total_images,
                  "info",
                );
              if (!data.last_result.success) throw new Error("Capture failed");
            }
            return;
          }
        }
        throw new Error("Timed out");
      }

      // ============================================================
      // BOOT
      // ============================================================
      HerdAuth.requireAuth().then((user) => showApp(user));
    </script>
  </body>
</html>
