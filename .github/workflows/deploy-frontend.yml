name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
      - ".github/actions/upload-shared-config/**"
  workflow_dispatch:

jobs:
  deploy-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for setup page changes
        id: check
        run: |
          if git diff --name-only HEAD~1 | grep -q "^frontend/setup/\|^frontend/js/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload shared config to S3 root
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: ./.github/actions/upload-shared-config
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        with:
          s3_bucket: goat-web-937249941844
          aws_region: us-east-2
          auth_base: ${{ secrets.AUTH_BASE }}
          api_base: ${{ secrets.API_BASE }}
          s3_training_bucket: ${{ secrets.S3_TRAINING_BUCKET }}

      - name: Deploy auth.js to S3
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2
        run: |
          aws s3 sync frontend/js/ s3://goat-web-937249941844/js/
          echo "Auth JS deployed"

      - name: Deploy setup UI to S3
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2
        run: |
          aws s3 sync frontend/setup/ s3://goat-web-937249941844/setup/
          echo "Setup UI deployed"

      - name: Invalidate CloudFront (setup + config + auth)
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2
        run: |
          aws cloudfront create-invalidation \
            --distribution-id EB8KCE4E7TGI4 \
            --paths "/setup/*" "/config.js" "/js/*"

  deploy-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for prod changes
        id: check
        run: |
          if git diff --name-only HEAD~1 | grep -q "^frontend/prod/\|^frontend/js/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload shared config to S3 root
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: ./.github/actions/upload-shared-config
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        with:
          s3_bucket: goat-web-937249941844
          aws_region: us-east-2
          auth_base: ${{ secrets.AUTH_BASE }}
          api_base: ${{ secrets.API_BASE }}
          s3_training_bucket: ${{ secrets.S3_TRAINING_BUCKET }}

      - name: Deploy auth.js to S3
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2
        run: |
          aws s3 sync frontend/js/ s3://goat-web-937249941844/js/
          echo "Auth JS deployed"

      - name: Deploy prod
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2
        run: |
          aws s3 sync frontend/prod/ s3://goat-web-937249941844/
          echo "Prod UI deployed"

      - name: Invalidate CloudFront (prod + config + auth)
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2
        run: |
          aws cloudfront create-invalidation \
            --distribution-id EB8KCE4E7TGI4 \
            --paths "/*" "/config.js" "/js/*"
