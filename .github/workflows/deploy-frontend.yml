name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  deploy-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate config
        run: |
          cat > frontend/setup/config.js << EOF
          const CONFIG = {
            PASS_HASH: "${{ secrets.PASS_HASH }}",
            API_BASE: "https://${{ secrets.TAILSCALE_HOST }}",
            S3_BUCKET: "${{ secrets.S3_TRAINING_BUCKET }}",
            S3_REGION: "us-east-2",
          };
          EOF

      - name: Check for setup page changes
        id: check
        run: |
          if git diff --name-only HEAD~1 | grep -q "frontend/setup/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy training UI to S3
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2
        run: |
          aws s3 sync frontend/setup/ s3://goat-web-937249941844/setup/
          echo "Setup UI deployed"

      - name: Invalidate CloudFront
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2
        run: |
          aws cloudfront create-invalidation --distribution-id EB8KCE4E7TGI4 --paths "/setup/*"

  deploy-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for prod changes
        id: check
        run: |
          if git diff --name-only HEAD~1 | grep -v "frontend/setup/" | grep -q "frontend/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy prod
        if: steps.check.outputs.changed == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2
        run: |
          aws s3 sync frontend/ s3://goat-web-937249941844/
          echo "Prod UI deployed"

      - name: Invalidate CloudFront
        if: steps.check.outputs.changed == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2
        run: |
          aws cloudfront create-invalidation --distribution-id EB8KCE4E7TGI4 --paths "/*"
