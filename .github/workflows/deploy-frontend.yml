name: Deploy Frontend

on:
  workflow_call:
  workflow_dispatch:

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: us-east-2
  S3_BUCKET: s3://herdsync-web-937249941844
  CF_DISTRIBUTION: EB8KCE4E7TGI4

jobs:
  deploy-shared-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Deploy to S3
        run: |
          aws s3 cp frontend/auth.js ${{ env.S3_BUCKET }}/auth.js
          aws s3 sync frontend/css/ ${{ env.S3_BUCKET }}/css/
          aws s3 sync frontend/js/ ${{ env.S3_BUCKET }}/js/
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ env.CF_DISTRIBUTION }} --paths "/auth.js" "/css/*" "/js/*"

  deploy-setup:
    runs-on: ubuntu-latest
    needs: deploy-shared-assets
    steps:
      - uses: actions/checkout@v5
      - name: Deploy to S3
        run: aws s3 cp frontend/setup.html ${{ env.S3_BUCKET }}/setup.html
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ env.CF_DISTRIBUTION }} --paths "/setup.html"

  deploy-landing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Deploy to S3
        run: aws s3 cp frontend/index.html ${{ env.S3_BUCKET }}/index.html
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ env.CF_DISTRIBUTION }} --paths "/index.html"

  deploy-signin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Deploy to S3
        run: aws s3 cp frontend/signin.html ${{ env.S3_BUCKET }}/signin.html
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ env.CF_DISTRIBUTION }} --paths "/signin.html"

  deploy-dashboard:
    runs-on: ubuntu-latest
    needs: deploy-shared-assets
    steps:
      - uses: actions/checkout@v5
      - name: Deploy to S3
        run: aws s3 cp frontend/dashboard.html ${{ env.S3_BUCKET }}/dashboard.html
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ env.CF_DISTRIBUTION }} --paths "/dashboard.html"

  deploy-logos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Deploy to S3
        run: aws s3 sync frontend/logos/ ${{ env.S3_BUCKET }}/logos/
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ env.CF_DISTRIBUTION }} --paths "/logos/*"

  deploy-diagrams:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Deploy to S3
        run: |
          aws s3 cp readme_assets/arch_diagrams/herdsync_architecture.png ${{ env.S3_BUCKET }}/diagrams/
          aws s3 cp readme_assets/arch_diagrams/herdsync_architecture_dark.png ${{ env.S3_BUCKET }}/diagrams/
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ env.CF_DISTRIBUTION }} --paths "/diagrams/*"
