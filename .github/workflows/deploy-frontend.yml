name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "readme_assets/db_schema.png"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  deploy-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for setup page changes
        id: check
        run: |
          if git diff --name-only HEAD~1 | grep -q "^frontend/setup/\|^frontend/js/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy auth.js to S3
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2
        run: |
          aws s3 sync frontend/js/ s3://herdsync-web-937249941844/js/
          echo "Auth JS deployed"

      - name: Deploy setup UI to S3
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2
        run: |
          aws s3 sync frontend/setup/ s3://herdsync-web-937249941844/setup/
          echo "Setup UI deployed"

      - name: Invalidate CloudFront (setup + config + auth)
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2
        run: |
          aws cloudfront create-invalidation \
            --distribution-id EB8KCE4E7TGI4 \
            --paths "/setup/*" "/js/config.js" "/js/*"

  deploy-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for dashboard changes
        id: check
        run: |
          if git diff --name-only HEAD~1 | grep -q "^frontend/index\.html\|^frontend/dashboard/\|^frontend/js/\|^frontend/logos/|^frontend/signin/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy auth.js to S3
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2
        run: |
          aws s3 sync frontend/js/ s3://herdsync-web-937249941844/js/
          echo "Auth JS deployed"

      - name: Deploy logos to S3
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2
        run: |
          aws s3 sync frontend/logos/ s3://herdsync-web-937249941844/logos/
          echo "Logos deployed"

      - name: Deploy assets to S3
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2
        run: |
          aws s3 cp readme_assets/db_schema.png s3://herdsync-web-937249941844/
          aws s3 cp readme_assets/arch_diagrams/herdsync_architecture.png s3://herdsync-web-937249941844/
          aws s3 cp readme_assets/arch_diagrams/herdsync_architecture_dark.png s3://herdsync-web-937249941844/
          echo "Dashboard assets deployed"

      - name: Deploy dashboard
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2
        run: |
          aws s3 sync frontend/dashboard/ s3://herdsync-web-937249941844/dashboard/
          aws s3 cp frontend/index.html s3://herdsync-web-937249941844/index.html
          aws s3 sync frontend/signin/ s3://herdsync-web-937249941844/signin/
          echo "Dashboard UI deployed"

      - name: Invalidate CloudFront (dashboard + config + auth)
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2
        run: |
          aws cloudfront create-invalidation \
            --distribution-id EB8KCE4E7TGI4 \
            --paths "/*" "/js/config.js" "/js/*" "/logos/*"
