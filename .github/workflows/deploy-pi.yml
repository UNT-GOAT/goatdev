name: Deploy to Raspberry Pi
on:
  workflow_call:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci
      - name: Deploy to Pi
        env:
          SSH_KEY: ${{ secrets.PI_SSH_KEY }}
          PI_TAILSCALE_IP: ${{ secrets.PI_TAILSCALE_IP }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no pi@${PI_TAILSCALE_IP} << 'EOF'
            set -e
            cd /home/pi/goatdev
            git fetch origin
            git reset --hard origin/main
            if [ ! -d "/home/pi/venv" ]; then
              python3 -m venv /home/pi/venv
            fi
            source /home/pi/venv/bin/activate
            pip install -r pi/requirements.txt --quiet
            sudo bash pi/system/deploy.sh

            # Order:
            #   1. Stop consumers (prod + training) so nothing is talking to proxy
            #   2. Restart camera-proxy and wait for it to be healthy
            #   3. Start consumers back up against the now-ready proxy
            #   4. Restart stateless services (display + heating) last

            echo "Stopping consumer services..."
            sudo systemctl stop goat-prod
            sudo systemctl stop goat-training

            echo "Restarting camera-proxy..."
            sudo systemctl restart camera-proxy

            echo "Waiting for camera-proxy health..."
            for i in $(seq 1 45); do
              if curl -sf --max-time 3 http://127.0.0.1:8080/status > /dev/null 2>&1; then
                echo "camera-proxy healthy after ~${i}s"
                break
              fi
              sleep 2
            done
            curl -sf --max-time 3 http://127.0.0.1:8080/status || echo "WARNING: camera-proxy not healthy after 90s"

            echo "Starting consumer services..."
            sudo systemctl start goat-prod
            sudo systemctl start goat-training

            echo "Restarting stateless services..."
            sudo systemctl restart goat-display
            sudo systemctl restart camera-heating

            echo "Deployed and restarted at $(date)"
            git log -1 --oneline
          EOF
