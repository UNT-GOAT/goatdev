name: Upload shared frontend config to S3 root
description: Generates frontend/config.js and uploads it to S3 bucket root as /config.js

inputs:
  auth_base:
    description: Base URL for auth api
    required: true
  api_base:
    description: Base URL for pi api's
    required: true
  db_base:
    description: Base URL for db api
    required: true

runs:
  using: "composite"
  steps:
    - name: Generate frontend/config.js
      shell: bash
      run: |
        mkdir -p frontend
        cat > frontend/config.js << 'EOF'
        const CONFIG = {
          AUTH_BASE: "__AUTH_BASE__",
          DB_BASE: "__DB_BASE__/db",
          API_BASE: "__API_BASE__",
        };
        EOF

        sed -i \
          -e "s|__AUTH_BASE__|${{ inputs.auth_base }}|g" \
          -e "s|__DB_BASE__|${{ inputs.db_base }}|g" \
          -e "s|__API_BASE__|${{ inputs.api_base }}|g" \
          frontend/config.js

    - name: Upload config.js to S3 root
      shell: bash
      env:
        AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ${{ inputs.aws_region }}
      run: |
        aws s3 cp frontend/config.js s3://${{ inputs.s3_bucket }}/js/config.js
