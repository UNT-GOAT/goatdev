name: Upload shared frontend config to S3 root
description: Generates frontend/config.js and uploads it to S3 bucket root as /config.js

inputs:
  s3_bucket:
    description: S3 bucket name (no s3://)
    required: true
  aws_region:
    description: AWS region (e.g. us-east-2)
    required: true

  tailscale_host:
    description: TAILSCALE host (domain or hostname, without scheme)
    required: true
  tailscale_port:
    description: TAILSCALE port (e.g. 8443)
    required: true
  s3_training_bucket:
    description: Training bucket name used by UI
    required: true

runs:
  using: "composite"
  steps:
    - name: Generate frontend/config.js
      shell: bash
      run: |
        mkdir -p frontend
        cat > frontend/config.js << 'EOF'
        const CONFIG = {
          API_BASE: "__API_BASE__",
          S3_BUCKET: "__S3_TRAINING_BUCKET__",
          S3_REGION: "__S3_REGION__",
        };
        EOF

        sed -i \
          -e "s|__TAILSCALE_HOST__|${{ inputs.tailscale_host }}|g" \
          -e "s|__TAILSCALE_PORT__|${{ inputs.tailscale_port }}|g" \
          -e "s|__S3_TRAINING_BUCKET__|${{ inputs.s3_training_bucket }}|g" \
          -e "s|__S3_REGION__|${{ inputs.aws_region }}|g" \
          frontend/config.js

    - name: Upload config.js to S3 root
      shell: bash
      env:
        AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ${{ inputs.aws_region }}
      run: |
        aws s3 cp frontend/config.js s3://${{ inputs.s3_bucket }}/config.js
